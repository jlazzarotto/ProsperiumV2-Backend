security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    providers:
        app_users:
            entity:
                class: App\Identity\Domain\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        login:
            pattern: ^/api/v1/auth/login$
            stateless: true
            json_login:
                check_path: /api/v1/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        api:
            pattern: ^/api/v1
            stateless: true
            provider: app_users
            jwt: ~
    access_control:
        - { path: ^/api/v1/health, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/users$, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/v1/pix/webhooks$, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/v1, roles: IS_AUTHENTICATED_FULLY }
